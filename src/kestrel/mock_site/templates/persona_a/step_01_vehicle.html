{% extends "base.html" %}
{% block title %}Vehicle{% endblock %}
{% block content %}
<form method="post"
      action="/quote/{{ sid|default('') }}/vehicle"
      class="aggregator-form"
      data-test-step="vehicle">
  <input type="hidden" name="_csrf" value="{{ csrf_token or '' }}">
  <fieldset>
    <legend>Vehicle</legend>
    <div class="row">
      <label for="vehicle-make">Make</label>
      <input id="vehicle-make" name="vehicle_make" type="text" data-test-field-vehicle_make>
      <span class="field-error" data-test-error-vehicle_make></span>
    </div>
    <div class="row">
      <label for="vehicle-model">Model</label>
      <input id="vehicle-model" name="vehicle_model" type="text" data-test-field-vehicle_model>
      <span class="field-error" data-test-error-vehicle_model></span>
    </div>
    <div class="row">
      <label for="vehicle-year">Year</label>
      <input id="vehicle-year" name="vehicle_year" type="text" data-test-field-vehicle_year>
      <span class="field-error" data-test-error-vehicle_year></span>
    </div>
    <div class="row">
      <label for="vehicle-value">Value</label>
      <input id="vehicle-value" name="vehicle_value" type="text" data-test-field-vehicle_value>
      <span class="field-error" data-test-error-vehicle_value></span>
    </div>
    <div class="row">
      <label for="vehicle-fuel">Fuel</label>
      <select id="vehicle-fuel" name="vehicle_fuel" data-test-field-vehicle_fuel>
        <option value=""></option>
        <option value="petrol">Petrol</option>
        <option value="diesel">Diesel</option>
        <option value="hybrid">Hybrid</option>
        <option value="electric">Electric</option>
      </select>
      <span class="field-error" data-test-error-vehicle_fuel></span>
    </div>
    <div class="row">
      <label for="vehicle-transmission">Transmission</label>
      <select id="vehicle-transmission" name="vehicle_transmission" data-test-field-vehicle_transmission>
        <option value=""></option>
        <option value="manual">Manual</option>
        <option value="automatic">Automatic</option>
      </select>
      <span class="field-error" data-test-error-vehicle_transmission></span>
    </div>
  </fieldset>
  <button data-test-submit>Continue</button>
</form>
{% endblock %}
